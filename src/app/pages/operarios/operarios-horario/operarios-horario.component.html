<div>
  <div class="form-group col-md-3 noprint">
    <label for="fecha">Fecha</label>
    <input
      id="fecha"
      type="date"
      name="fecha"
      placeholder="dia resumen"
      [(ngModel)]="fecha"
      class="form-control"
      (ngModelChange)="setDates()"
      />
    </div>
  </div>

  <div class="book">
    @for (operario of operarios; track operario; let i = $index) {
      <div class="page">
        <div class="subpage">
          <p class="font-weight-bold">
            REGISTRO DIARIO DE JORNADA TRABAJADORES A TIEMPO COMPLETO
          </p>
          <div class="row">
            <div class="col font-weight-bold">
              {{ operario.nombre | uppercase }}
            </div>
            <div class="col font-weight-bold">{{ fechaLabel }}</div>
            <div class="col font-weight-bold">R.A. BENIDORM, S.L.</div>
          </div>
          <div>
            <table class="table table-bordered">
              <thead>
                <th style="width: 20%">DIA</th>
                <th>HORA ENTRADA</th>
                <th style="width: 30%">FIRMA</th>
                <th>HORA SALIDA</th>
                <th style="width: 30%">FIRMA</th>
              </thead>
              <tbody>
                @for (dia of fechas; track dia; let i = $index) {
                  <tr>
                    <td>{{ dia }}</td>
                    <td></td>
                    <td></td>
                    <td></td>
                    <td></td>
                  </tr>
                }
              </tbody>
            </table>
          </div>
        </div>
      </div>
    }
  </div>
